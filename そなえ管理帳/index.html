<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>そなえ管理帳｜防災備蓄チェッカー</title>
<style>
  :root {
    --bg: #f4f1ea;
    --panel: #ffffff;
    --ink: #2e2a24;
    --sub: #7a7267;
    --accent: #b3541e;
    --accent2: #2f7a4f;
    --danger: #c0392b;
    --warn: #d9a441;
    --ok: #2f7a4f;
    --border: #e4ddce;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
  }
  .subtitle { color: var(--sub); font-size: 13px; margin-bottom: 20px; }

  .dashboard {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .gauge {
    width: 120px; height: 120px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: conic-gradient(var(--accent2) calc(var(--pct, 0) * 1%), var(--border) 0);
    flex-shrink: 0;
  }
  .gauge-inner {
    width: 92px; height: 92px;
    background: var(--panel);
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .gauge-inner .num { font-size: 26px; font-weight: bold; }
  .gauge-inner .lbl { font-size: 11px; color: var(--sub); }

  .dash-right { flex: 1; min-width: 240px; }
  .settings-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 13px; }
  .settings-row label { display: flex; align-items: center; gap: 6px; }
  input[type=number] {
    width: 64px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }
  select {
    padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }

  .alerts { font-size: 13px; }
  .alert-item {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    margin: 2px 4px 2px 0;
    font-size: 12px;
  }
  .alert-red { background: #fbe4e0; color: var(--danger); }
  .alert-yellow { background: #f9edd1; color: #8a6d1c; }
  .alert-none { color: var(--sub); }

  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab-btn {
    padding: 8px 16px;
    border-radius: 8px 8px 0 0;
    border: 1px solid var(--border);
    background: #eae4d6;
    cursor: pointer;
    font-size: 14px;
    color: var(--sub);
  }
  .tab-btn.active {
    background: var(--panel);
    color: var(--ink);
    font-weight: bold;
    border-bottom-color: var(--panel);
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 12px 12px 12px;
    padding: 18px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 6px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
  th { color: var(--sub); font-weight: normal; font-size: 12px; }
  td input[type=number] { width: 60px; }
  td input[type=date] { padding: 3px 4px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
  .bar-cell { width: 140px; }
  .bar-bg { background: #ece6d8; border-radius: 6px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent2); }
  .bar-fill.low { background: var(--danger); }
  .bar-fill.mid { background: var(--warn); }
  .pct-txt { font-size: 11px; color: var(--sub); margin-top: 2px; }

  .exp-badge {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 3px;
  }
  .exp-red { background: #fbe4e0; color: var(--danger); }
  .exp-yellow { background: #f9edd1; color: #8a6d1c; }
  .exp-green { background: #e2efe3; color: var(--ok); }

  .del-btn {
    border: none; background: none; color: var(--sub); cursor: pointer; font-size: 15px;
  }
  .del-btn:hover { color: var(--danger); }

  .add-row {
    display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center;
  }
  .add-row input[type=text] {
    padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }
  .add-row input.name { width: 140px; }
  .add-row input.unit { width: 70px; }
  .add-btn {
    padding: 6px 14px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .add-btn:hover { opacity: 0.9; }

  .bag-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 4px; border-bottom: 1px solid var(--border);
  }
  .bag-item label { flex: 1; font-size: 13px; }
  .bag-item input[type=checkbox] { width: 17px; height: 17px; }
  .category-head { font-size: 12px; color: var(--accent); font-weight: bold; margin: 14px 0 4px; text-transform: none; }
  .category-head:first-child { margin-top: 0; }

  footer { text-align: center; font-size: 11px; color: var(--sub); margin-top: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>そなえ管理帳</h1>
  <div class="subtitle">防災備蓄と非常持ち出し袋の準備状況をまとめて管理するツール</div>

  <div class="dashboard">
    <div class="gauge" id="gauge" style="--pct:0;">
      <div class="gauge-inner">
        <div class="num" id="gaugeNum">0%</div>
        <div class="lbl">そなえ度</div>
      </div>
    </div>
    <div class="dash-right">
      <div class="settings-row">
        <label>世帯人数
          <input type="number" id="household" min="1" max="10" value="1">
          人
        </label>
        <label>備蓄日数
          <select id="days">
            <option value="3">3日分（最低限）</option>
            <option value="7">7日分（推奨）</option>
          </select>
        </label>
      </div>
      <div class="alerts" id="alerts">期限が近い品目はありません</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="stock">備蓄品</button>
    <button class="tab-btn" data-tab="bag">非常持ち出し袋</button>
  </div>

  <div class="panel" id="stockPanel">
    <table>
      <thead>
        <tr>
          <th>品目</th>
          <th>推奨量</th>
          <th>保有量</th>
          <th class="bar-cell">達成率</th>
          <th>消費期限／交換目安</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stockBody"></tbody>
    </table>
    <div class="add-row">
      <input type="text" class="name" id="newName" placeholder="品目名（例: カセットボンベ）">
      <input type="number" id="newRecommended" placeholder="推奨量" min="0" style="width:80px;">
      <input type="text" class="unit" id="newUnit" placeholder="単位（例: 本）">
      <input type="number" id="newHave" placeholder="保有量" min="0" style="width:80px;">
      <button class="add-btn" id="addStockBtn">＋ 品目を追加</button>
    </div>
  </div>

  <div class="panel" id="bagPanel" style="display:none;"></div>

  <footer>そなえ管理帳｜入力内容はこのページを開いている間のみ保持されます（保存はされません）</footer>
</div>

<script>
// ---- データ定義 ----
// 1人・1日あたりの必要量の目安（内閣府・農水省の防災備蓄ガイドラインを参考にした簡易値）
const baseItems = [
  { key: "water", name: "飲料水", unit: "L", perPersonPerDay: 3, have: 0, expiry: "" },
  { key: "staple", name: "主食（米・パックご飯等）", unit: "食", perPersonPerDay: 3, have: 0, expiry: "" },
  { key: "retort", name: "缶詰・レトルト食品", unit: "食", perPersonPerDay: 1, have: 0, expiry: "" },
  { key: "battery", name: "乾電池", unit: "本", perPersonPerDay: 0.5, have: 0, expiry: "" },
  { key: "gascan", name: "カセットボンベ", unit: "本", perPersonPerDay: 0.3, have: 0, expiry: "" },
  { key: "toilet", name: "トイレットペーパー", unit: "ロール", perPersonPerDay: 0.2, have: 0, expiry: "" },
  { key: "wipes", name: "ウェットティッシュ", unit: "パック", perPersonPerDay: 0.15, have: 0, expiry: "" },
];

// カスタム追加品目（推奨量は固定値、人数連動なし）
let customItems = [];

const bagCategories = [
  {
    name: "貴重品・情報",
    items: ["現金（小銭含む）", "身分証明書のコピー", "健康保険証のコピー", "携帯電話の充電器・モバイルバッテリー"]
  },
  {
    name: "安全・照明",
    items: ["懐中電灯", "笛・ホイッスル", "軍手", "ヘルメット・防災頭巾"]
  },
  {
    name: "衛生・医療",
    items: ["救急セット（絆創膏・消毒液等）", "常備薬・お薬手帳のコピー", "マスク", "携帯トイレ"]
  },
  {
    name: "情報・その他",
    items: ["携帯ラジオ", "筆記用具・メモ帳", "雨具", "予備の眼鏡・コンタクト"]
  }
];
// チェック状態
let bagState = {};
bagCategories.forEach(cat => cat.items.forEach(i => bagState[i] = false));

// ---- レンダリング ----
function getSettings() {
  const household = Math.max(1, parseInt(document.getElementById("household").value) || 1);
  const days = parseInt(document.getElementById("days").value) || 3;
  return { household, days };
}

function computeRecommended(item, settings) {
  return Math.round(item.perPersonPerDay * settings.household * settings.days * 10) / 10;
}

function expiryBadge(dateStr) {
  if (!dateStr) return "";
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(dateStr);
  const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
  if (diffDays < 0) return { cls: "exp-red", text: "期限切れ" };
  if (diffDays <= 30) return { cls: "exp-red", text: `あと${diffDays}日` };
  if (diffDays <= 90) return { cls: "exp-yellow", text: `あと${diffDays}日` };
  return { cls: "exp-green", text: `あと${diffDays}日` };
}

function renderStock() {
  const settings = getSettings();
  const tbody = document.getElementById("stockBody");
  tbody.innerHTML = "";

  const allItems = [...baseItems.map((item, idx) => ({ item, idx, custom: false })),
                     ...customItems.map((item, idx) => ({ item, idx, custom: true }))];

  allItems.forEach(({ item, idx, custom }) => {
    const recommended = custom ? item.recommended : computeRecommended(item, settings);
    const pct = recommended > 0 ? Math.min(100, Math.round((item.have / recommended) * 100)) : 100;
    const barClass = pct < 40 ? "low" : (pct < 80 ? "mid" : "");
    const badge = expiryBadge(item.expiry);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.name}</td>
      <td>${recommended} ${item.unit}</td>
      <td><input type="number" min="0" value="${item.have}" data-role="have" data-custom="${custom}" data-idx="${idx}"></td>
      <td class="bar-cell">
        <div class="bar-bg"><div class="bar-fill ${barClass}" style="width:${pct}%;"></div></div>
        <div class="pct-txt">${pct}%</div>
      </td>
      <td>
        <input type="date" data-role="expiry" data-custom="${custom}" data-idx="${idx}" value="${item.expiry}">
        ${badge ? `<div class="exp-badge ${badge.cls}">${badge.text}</div>` : ""}
      </td>
      <td>${custom ? `<button class="del-btn" data-role="del" data-idx="${idx}">✕</button>` : ""}</td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll("[data-role=have]").forEach(el => {
    el.addEventListener("input", (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const custom = e.target.dataset.custom === "true";
      const val = Math.max(0, parseFloat(e.target.value) || 0);
      (custom ? customItems : baseItems)[idx].have = val;
      renderAll();
    });
  });
  tbody.querySelectorAll("[data-role=expiry]").forEach(el => {
    el.addEventListener("change", (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const custom = e.target.dataset.custom === "true";
      (custom ? customItems : baseItems)[idx].expiry = e.target.value;
      renderAll();
    });
  });
  tbody.querySelectorAll("[data-role=del]").forEach(el => {
    el.addEventListener("click", (e) => {
      const idx = parseInt(e.target.dataset.idx);
      customItems.splice(idx, 1);
      renderAll();
    });
  });
}

function renderBag() {
  const panel = document.getElementById("bagPanel");
  panel.innerHTML = "";
  bagCategories.forEach(cat => {
    const head = document.createElement("div");
    head.className = "category-head";
    head.textContent = cat.name;
    panel.appendChild(head);
    cat.items.forEach(itemName => {
      const row = document.createElement("div");
      row.className = "bag-item";
      const id = "bag_" + itemName;
      row.innerHTML = `
        <input type="checkbox" id="${id}" ${bagState[itemName] ? "checked" : ""}>
        <label for="${id}">${itemName}</label>
      `;
      panel.appendChild(row);
      row.querySelector("input").addEventListener("change", (e) => {
        bagState[itemName] = e.target.checked;
        renderAll();
      });
    });
  });
}

function computeOverallScore() {
  const settings = getSettings();
  const allItems = [...baseItems, ...customItems];
  let stockScoreSum = 0;
  allItems.forEach(item => {
    const recommended = item.perPersonPerDay !== undefined ? computeRecommended(item, settings) : item.recommended;
    const pct = recommended > 0 ? Math.min(100, (item.have / recommended) * 100) : 100;
    stockScoreSum += pct;
  });
  const stockScore = allItems.length > 0 ? stockScoreSum / allItems.length : 0;

  const bagKeys = Object.keys(bagState);
  const bagChecked = bagKeys.filter(k => bagState[k]).length;
  const bagScore = bagKeys.length > 0 ? (bagChecked / bagKeys.length) * 100 : 0;

  return Math.round((stockScore + bagScore) / 2);
}

function renderDashboard() {
  const score = computeOverallScore();
  document.getElementById("gauge").style.setProperty("--pct", score);
  document.getElementById("gaugeNum").textContent = score + "%";

  // 期限アラート集計
  const allItems = [...baseItems, ...customItems];
  const today = new Date();
  today.setHours(0,0,0,0);
  const redItems = [];
  const yellowItems = [];
  allItems.forEach(item => {
    if (!item.expiry) return;
    const target = new Date(item.expiry);
    const diffDays = Math.ceil((target - today) / (1000*60*60*24));
    if (diffDays <= 30) redItems.push(item.name);
    else if (diffDays <= 90) yellowItems.push(item.name);
  });

  const alertsEl = document.getElementById("alerts");
  if (redItems.length === 0 && yellowItems.length === 0) {
    alertsEl.innerHTML = `<span class="alert-none">期限が近い品目はありません</span>`;
  } else {
    let html = "";
    redItems.forEach(n => html += `<span class="alert-item alert-red">⚠ ${n}</span>`);
    yellowItems.forEach(n => html += `<span class="alert-item alert-yellow">${n}</span>`);
    alertsEl.innerHTML = html;
  }
}

function renderAll() {
  renderStock();
  renderBag();
  renderDashboard();
}

// ---- イベント ----
document.getElementById("household").addEventListener("input", renderAll);
document.getElementById("days").addEventListener("change", renderAll);

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    document.getElementById("stockPanel").style.display = tab === "stock" ? "block" : "none";
    document.getElementById("bagPanel").style.display = tab === "bag" ? "block" : "none";
  });
});

document.getElementById("addStockBtn").addEventListener("click", () => {
  const nameEl = document.getElementById("newName");
  const recEl = document.getElementById("newRecommended");
  const unitEl = document.getElementById("newUnit");
  const haveEl = document.getElementById("newHave");

  const name = nameEl.value.trim();
  if (!name) {
    alert("品目名を入力してください");
    return;
  }
  const recommended = Math.max(0, parseFloat(recEl.value) || 0);
  const unit = unitEl.value.trim() || "個";
  const have = Math.max(0, parseFloat(haveEl.value) || 0);

  customItems.push({ name, unit, recommended, have, expiry: "" });

  nameEl.value = "";
  recEl.value = "";
  unitEl.value = "";
  haveEl.value = "";
  renderAll();
});

// 初期表示
renderAll();
</script>
</body>
</html>
